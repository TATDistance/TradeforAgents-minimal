initial_cash: 100000
refresh_interval_seconds: 10
scan_limit: 200
strategy_candidate_limit: 20
max_single_position_pct: 0.2
max_daily_open_position_pct: 0.4
max_drawdown_pct: 0.08
commission_rate: 0.0003
stamp_duty_rate: 0.0005
slippage_rate: 0.0005
transfer_fee_rate: 1.0e-05
ai_mode: quick
enable_ai: true
use_eastmoney_realtime: true
min_turnover: 50000000
min_listing_days: 120
limit_up_filter_pct: 0.097
limit_down_filter_pct: -0.097
dashboard_refresh_seconds: 5
evaluation:
  rolling_trade_windows:
  - 20
  - 50
  rolling_day_windows:
  - 20
  - 60
  enable_strategy_scoring: true
  report_auto_generate: true
scoring:
  weight_return: 0.3
  weight_risk: 0.3
  weight_stability: 0.2
  weight_execution: 0.2
  min_setup_score_to_watch: 0.35
  min_execution_score_to_buy: 0.55
  min_execution_score_to_reduce: 0.45
dashboard:
  auto_refresh_seconds: 10
  enable_log_filter: true
  enable_mode_comparison: true
market_regime:
  enabled: true
  default_regime: RANGE_BOUND
strategy_weights:
  enabled: true
  dynamic_adjustment: true
ai_portfolio_manager:
  enabled: true
  default_risk_mode: NORMAL
  allow_reduce_actions: true
  allow_sell_actions: true
  allow_new_buy_actions: true
portfolio_feedback:
  enabled: true
  drawdown_defensive_threshold: 0.03
  drawdown_risk_off_threshold: 0.05
  high_position_threshold: 0.7
fusion:
  use_weighted_scoring: true
  min_final_score_to_buy: 0.65
  min_final_score_to_sell: 0.58
decision_engine:
  enabled: true
  mode: ai_decision_engine_mode
  use_decision_json_as_research_cache: true
  fallback_to_legacy_mode_on_failure: true
  lightweight_realtime_ai: true
feature_layer:
  use_strategy_scores: true
  use_market_regime: true
  use_portfolio_state: true
  use_position_state: true
compare_mode:
  enabled: true
  record_mode_differences: true
runtime:
  engine_mode: event_driven_mode
trigger:
  price_change_threshold_pct: 0.003
  pct_change_delta_threshold: 0.003
  amount_delta_threshold: 0.2
  feature_score_delta_threshold: 0.08
  portfolio_state_delta_threshold: 0.05
  cooldown_seconds: 20
  stale_refresh_seconds: 120
watchlist:
  enable_auto_refresh_on_start: true
  use_recent_candidates_as_fallback: true
  use_default_watchlist_as_last_resort: true
watchlist_evolution:
  enabled: true
  scan_interval_minutes: 30
  max_watchlist_size: 30
  max_new_symbols_per_scan: 10
  max_remove_symbols_per_scan: 5
  min_score_to_add: 0.55
  min_score_to_keep: 0.30
  grace_period_minutes: 60
ui:
  default_page: ai_home
  enable_research_center: true
  enable_debug_panel: true
  show_intraday_chart: true
  show_kline_chart: true
  show_equity_curve: true
  show_action_timeline: true
  default_symbol_selection_mode: priority_based
strategy:
  momentum_lookback: 20
  momentum_min_score: 0.55
  dual_ma_fast_window: 10
  dual_ma_slow_window: 30
  macd_fast_window: 12
  macd_slow_window: 26
  macd_signal_window: 9
  mean_reversion_rsi_low: 30
  mean_reversion_boll_window: 20
  breakout_window: 20
  atr_window: 14
  trend_pullback_fast_window: 20
  trend_pullback_slow_window: 60
  trend_pullback_max_distance_pct: 0.03
ai:
  approval_confidence_floor: 0.58
  low_confidence_scale: 0.5
  request_timeout_seconds: 120
market_session:
  timezone: Asia/Shanghai
  trade_start: 09:30
  lunch_start: '11:30'
  lunch_end: '13:00'
  trade_end: '15:00'
  post_close_analysis_start: '15:05'
  post_close_analysis_end: '18:00'
  enable_weekend_guard: true
  allow_post_close_paper_execution: false
trading_calendar:
  enabled: true
  timezone: Asia/Shanghai
  calendar_source: local_file
  calendar_file: data/calendars/cn_a_2026.json
market_phase:
  enabled: true
  pre_open_start: 09:00:00
  open_call_start: 09:15:00
  open_call_end: 09:25:00
  am_continuous_start: 09:30:00
  am_continuous_end: '11:30:00'
  midday_start: '11:30:00'
  midday_end: '13:00:00'
  pm_continuous_start: '13:00:00'
  pm_continuous_end: 14:57:00
  closing_call_start: 14:57:00
  closing_call_end: '15:00:00'
execution_gate:
  block_new_buy_in_closing_call: true
  block_all_fill_outside_continuous_auction: true
  allow_post_close_analysis: true
cache:
  snapshot_ttl_seconds: 8
  quote_ttl_seconds: 8
  history_market_hours_ttl_seconds: 1800
  history_off_hours_ttl_seconds: 21600
paths:
  tradeforagents_results_dir: ../results
  tradeforagents_script: ../scripts/run_minimal_deepseek.sh
  vnpy_workspace: external/vnpy_workspace
